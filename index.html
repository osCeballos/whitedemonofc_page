<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Whitedemon - Página oficial. Tour, música, merchandise y más.">
    <title>Whitedemon-Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav class="menu">
            <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú" aria-expanded="false">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
            <ul id="menu-list">
                <li>Tour</li>
                <li>Musica</li>
                <li>Tienda</li>
                <li>Acerca de nosotros</li>
                <li>Contacto</li>
            </ul>
        </nav>
        <img class="nv-merch" src="assets/nv_merch.png" alt="NUEVO MERCHANDISE" loading="lazy">
    </header>

    <main class="hero">
        <canvas id="three-canvas"></canvas>

        <div class="logo-container">
            <img src="assets/logo_wd.png" alt="Whitedemon-Logo" class="main-logo">
        </div>

        <div class="footer-hero">
            <p>¡DESCUBRE MAS!</p>
        </div>
    </main>

    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script defer src="scripts.js"></script>
</body>

</html>
